<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - OIDC</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: #fff;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 100%;
            max-width: 360px;
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 24px;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: #37352f;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-icon svg {
            width: 20px;
            height: 20px;
            fill: #fff;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 600;
            color: #37352f;
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 6px;
            color: #37352f;
        }

        .subtitle {
            font-size: 14px;
            color: #787774;
            text-align: center;
            margin-bottom: 28px;
        }

        .form-group {
            margin-bottom: 14px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: #37352f;
            margin-bottom: 6px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 10px 12px;
            font-size: 14px;
            border: 1px solid #e3e2de;
            border-radius: 4px;
            background: #fff;
            color: #37352f;
            transition: border-color 0.15s;
        }

        input::placeholder {
            color: #9b9a97;
        }

        input:focus {
            outline: none;
            border-color: #37352f;
        }

        .options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 16px 0;
            font-size: 13px;
        }

        .remember {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .remember input {
            width: 14px;
            height: 14px;
            accent-color: #37352f;
            cursor: pointer;
        }

        .remember span {
            color: #37352f;
            user-select: none;
        }

        .forgot {
            color: #37352f;
            text-decoration: underline;
            text-underline-offset: 2px;
        }

        .forgot:hover {
            color: #787774;
        }

        button {
            width: 100%;
            padding: 10px;
            font-size: 14px;
            font-weight: 500;
            background: #37352f;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.15s;
        }

        button:hover {
            background: #2f2e29;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .error {
            background: #fdecea;
            border: 1px solid #e77b7b;
            color: #c34b4b;
            padding: 10px 12px;
            border-radius: 4px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }

        .error.show {
            display: block;
        }

        .footer {
            margin-top: 20px;
            text-align: center;
            font-size: 13px;
            color: #787774;
        }

        .footer a {
            color: #37352f;
            text-decoration: underline;
            text-underline-offset: 2px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24">
                    <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/>
                </svg>
            </div>
            <span class="logo-text">OIDC</span>
        </div>

        <h1>欢迎回来</h1>
        <p class="subtitle">登录以继续访问您的账户</p>

        <div id="error" class="error"></div>

        <form id="loginForm">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="username" name="username" placeholder="输入用户名" required autocomplete="username">
            </div>

            <div class="form-group">
                <label>密码</label>
                <input type="password" id="password" name="password" placeholder="输入密码" required autocomplete="current-password">
            </div>

            <div class="options">
                <label class="remember">
                    <input type="checkbox" id="remember" name="remember">
                    <span>记住我</span>
                </label>
                <a href="#" class="forgot">忘记密码？</a>
            </div>

            <button type="submit" id="submitBtn">登录</button>
        </form>

        <div class="footer">
            <a href="/">了解更多</a> 关于 OIDC 认证
        </div>
    </div>

    <script>
        const redirectParam = {{if .redirect}}"{{.redirect}}"{{else}}""{{end}};
        
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const submitBtn = document.getElementById('submitBtn');
            const errorDiv = document.getElementById('error');
            
            submitBtn.disabled = true;
            submitBtn.textContent = '登录中...';
            
            try {
                let requestBody = `username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`;
                if (redirectParam) {
                    requestBody += `&redirect=${encodeURIComponent(redirectParam)}`;
                }
                
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: requestBody
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    window.location.href = data.redirect || '/';
                } else {
                    errorDiv.textContent = data.error || '登录失败';
                    errorDiv.classList.add('show');
                    setTimeout(() => errorDiv.classList.remove('show'), 3000);
                }
            } catch (error) {
                errorDiv.textContent = '网络错误，请稍后重试';
                errorDiv.classList.add('show');
                setTimeout(() => errorDiv.classList.remove('show'), 3000);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '登录';
            }
        });
    </script>
</body>
</html>
